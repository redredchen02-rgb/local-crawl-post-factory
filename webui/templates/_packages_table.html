{% if not packages %}
  <p class="hint">尚無上膛貼文。到<a href="/settings">設定</a>輸入 URL 並爬取。</p>
{% else %}
  <form id="batch-form">
  <div class="batch-bar">
    <button type="button" hx-post="/batch/draft" hx-include="#batch-form"
            hx-target="#batch-result" hx-swap="innerHTML">批量建草稿</button>
    <button type="button" hx-post="/batch/verify" hx-include="#batch-form"
            hx-target="#batch-result" hx-swap="innerHTML">批量驗證</button>
    <button type="button" class="danger" hx-post="/batch/delete" hx-include="#batch-form"
            hx-target="#pkg-list" hx-swap="innerHTML"
            hx-confirm="確定移入垃圾桶？可至 out/.trash/ 復原">批量刪除</button>
    <span class="hint">（發布請點入貼文於審核頁確認；已啟用自動發布模式時爬取後自動執行）</span>
  </div>
  <div id="batch-result"></div>
  <div class="table-wrap">
  <table>
    <thead><tr><th></th><th>post_id</th><th>標題</th><th>狀態</th><th></th></tr></thead>
    <tbody>
    {% for p in packages %}
      <tr{% if p.broken %} class="error"{% endif %}>
        <td>{% if not p.broken %}<input type="checkbox" name="post_ids" value="{{ p.post_id }}">{% endif %}</td>
        <td>{% if not p.broken %}<a href="/packages/{{ p.post_id }}">{{ p.post_id }}</a>{% else %}{{ p.post_id }}{% endif %}</td>
        <td>{{ p.title }}</td>
        <td><span class="pill {{ p.status }}">{{ p.status }}</span></td>
        <td><button type="button" class="danger" hx-post="/packages/{{ p.post_id }}/delete"
                    hx-target="#pkg-list" hx-swap="innerHTML"
                    hx-confirm="確定刪除 {{ p.post_id }}？將移到 out/.trash/（可復原）">刪除</button></td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
  </div>
  </form>
{% endif %}
