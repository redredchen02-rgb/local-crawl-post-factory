{% extends "base.html" %}
{% block heading %}上膛清單 / Staged Packages{% endblock %}
{% block content %}
<div class="toolbar">
  <input type="text" name="q" value="{{ q }}" placeholder="搜尋標題或 post_id…"
         hx-get="/packages" hx-target="#pkg-list" hx-swap="innerHTML"
         hx-trigger="keyup changed delay:300ms" hx-include="[name='status']">
  <select name="status" hx-get="/packages" hx-target="#pkg-list" hx-swap="innerHTML"
          hx-trigger="change" hx-include="[name='q']">
    <option value="">全部狀態</option>
    <option value="package_built"{% if status == 'package_built' %} selected{% endif %}>package_built</option>
    <option value="draft_verified"{% if status == 'draft_verified' %} selected{% endif %}>draft_verified</option>
    <option value="published"{% if status == 'published' %} selected{% endif %}>published</option>
    <option value="error"{% if status == 'error' %} selected{% endif %}>error</option>
  </select>
</div>

<div id="pkg-list">
{% include "_packages_table.html" %}
</div>

<p class="hint">點入貼文可在 WebUI 發布；或啟用<a href="/settings">自動發布模式</a>讓爬取後全程自動執行。</p>
{% endblock %}
