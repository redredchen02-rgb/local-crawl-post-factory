# 聚類 + 打分可調參數（plan 2026-06-18-004，U3/U4）。
# 缺檔或缺鍵時程式回退 cpost/core/scoring_config.py 的 DEFAULTS。
# 門檻/權重待有真實多源資料時校準——只改這裡，不必改碼。

# --- 聚類（cpost.core.cluster）---
ngram: 2                    # 標題字元 n-gram 大小（語言無關，適用中英）
similarity_threshold: 0.5   # Jaccard 相似度門檻：>= 此值才視為同一件瓜
time_window_hours: 72       # 兩筆都帶 published_at 時，須落在此時間窗內才聚合

# --- 打分（cpost.core.scoring）---
confidence_source_cap: 3        # 置信度封頂的獨立來源數（達此值即滿分 1.0）
quality_full_text_chars: 3500   # 完整度正規化基準：正文達此字數視為「完整」（2026-06-22 校準：實測單源正文 1870-3627 字，1000 會讓人人滿分無區分）
quality_recency_window_hours: 168  # 時近度衰減窗（7 天內最高分）
quality_material_cap: 3         # 素材量（成員數）正規化封頂

# 品質三因子權重（會正規化，不必剛好相加=1）
weight_completeness: 0.5
weight_recency: 0.2
weight_material: 0.3

# 綜合分 = w_confidence*置信度 + w_quality*品質。
# 信心軸已中性化（plan U9 / Key Decision）：confidence 仍照算並填入資訊欄，
# 但權重設 0 → combined() 完全忽略它，排序由品質單獨決定。total weight 仍 > 0。
# confidence/source_count 為「資訊性，非佐證」（鏡像/同 canonical 會塌成 1）。
weight_confidence: 0.0
weight_quality: 1.0

# --- 4D 打分 v2（cpost.core.scoring, plan scoring-pipeline-v2）---
# 新鮮度（freshness）
freshness_w_recency: 0.6
freshness_w_velocity: 0.4
freshness_velocity_window_hours: 24
# 重要性（importance）
importance_w_completeness: 0.5
importance_w_material: 0.3
importance_w_diversity: 0.2
importance_diversity_threshold: 0.3
# 流量潛力（traffic_potential）
traffic_w_volume: 0.4
traffic_w_sources: 0.3
traffic_w_diversity: 0.3
traffic_article_cap: 50
traffic_source_cap: 10
traffic_diversity_cap: 3
# 跨站覆蓋度（cross_site_coverage）
cross_site_source_cap: 5
# 四維聚合權重
weight_freshness: 0.25
weight_importance: 0.25
weight_traffic_potential: 0.25
weight_cross_site_coverage: 0.25
# 外部檢索（config-gated，預設關閉）
external_search_enabled: false
external_search_max_results: 5
external_search_engines: ["duckduckgo"]

# actionable 過濾（plan U5）：score-scoops --min-sources 未明確指定時讀此值作為預設。
# 0 = 不過濾（向後相容）；設 2 表示只輸出 2+ 站交集的 scoop。
actionable_min_sources: 2

# --- 站點管理 ---
# 鏡像偵測（U3）：sample canonical URL 中超過此比例已存在 library active 站點者
# 判定為鏡像站。0.6 = 60% 以上重疊即視為鏡像。
mirror_overlap_threshold: 0.6
