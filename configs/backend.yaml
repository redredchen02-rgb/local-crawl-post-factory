create_url: "https://example.com/admin/posts/create"
selectors:
  title: 'input[name="title"]'
  body: 'textarea[name="content"]'
  category: 'select[name="category"]'
  tags: 'input[name="tags"]'
  save_draft: 'button:has-text("儲存草稿")'
  publish: 'button:has-text("發布")'
verify:
  draft_success_text: "草稿已儲存"
  publish_success_text: "發布成功"
  after_draft_url_contains: "/admin/posts"
  after_publish_url_contains: "/admin/posts"
  search_url: "https://example.com/admin/posts"
  search_input: 'input[name="keyword"]'
  search_button: 'button:has-text("搜尋")'
  result_title: 'table >> text={title}'
  # When the admin redirects an expired session here, the driver raises a
  # distinguishable SessionExpiredError (remedy: re-run auth-login). Tune to the
  # real backend's login URL marker.
  login_required_url_contains: "/admin/login"
retry:
  count: 2          # total attempts per backend action on transient failure
  backoff_sec: 0.5  # delay grows linearly: backoff_sec * attempt
