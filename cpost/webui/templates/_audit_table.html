{% if not lines %}
  <p class="hint">尚無 audit 紀錄。</p>
{% else %}
  <div class="table-wrap">
  <table>
    <thead><tr><th>時間</th><th>階段</th><th>post_id</th><th>狀態</th><th>其他</th></tr></thead>
    <tbody>
    {% for e in lines %}
      <tr{% if e.status == 'error' %} class="error"{% endif %}>
        <td>{{ e.ts }}</td><td>{{ e.stage }}</td>
        <td>{% if e.post_id %}<a href="/packages/{{ e.post_id }}">{{ e.post_id }}</a>{% endif %}</td>
        <td><span class="pill {{ e.status }}">{{ e.status }}</span></td>
        <td>{{ e.error or e.draft_url or e.published_url or '' }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
  </div>
{% endif %}
