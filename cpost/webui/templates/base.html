<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>local-crawl-post-factory</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
<div id="toast-container"></div>
<script>
(function(){
  var MAX=3, AUTO_MS=3000;
  function show(msg, type){
    var c=document.getElementById('toast-container');
    while(c.children.length>=MAX) c.removeChild(c.firstChild);
    var t=document.createElement('div');
    t.className='toast '+(type==='ok'?'ok':'err');
    t.textContent=msg;
    t.onclick=function(){t.remove();};
    c.appendChild(t);
    if(type==='ok') setTimeout(function(){if(t.parentNode)t.remove();},AUTO_MS);
  }
  document.addEventListener('htmx:afterRequest',function(e){
    var ok=e.detail.successful;
    var xhr=e.detail.xhr;
    if(!xhr) return;
    var ct=xhr.getResponseHeader('content-type')||'';
    if(!ct.includes('text/html')) return;
    var txt=xhr.responseText||'';
    var mOk=txt.match(/<p[^>]*\bok\b[^>]*>([\s\S]*?)<\/p>/);
    var mErr=txt.match(/<p[^>]*\berror\b[^>]*>([\s\S]*?)<\/p>/);
    if(mOk) show(mOk[1].replace(/<[^>]+>/g,'').trim(),'ok');
    else if(mErr) show(mErr[1].replace(/<[^>]+>/g,'').trim(),'err');
    else if(!ok) show('操作失敗（HTTP '+xhr.status+'）','err');
  });
})();
</script>
<div class="app-shell">
  <button id="nav-toggle" aria-label="開啟選單">☰</button>
  <div id="sidebar-backdrop"></div>
  <aside class="sidebar">
    <div class="sidebar-brand">local-crawl-post-factory</div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item">總覽</a>
      <a href="/today" class="nav-item">今日備稿</a>
      <a href="/packages" class="nav-item">上膛清單</a>
      <a href="/scoops" class="nav-item">瓜清單</a>
      <a href="/gossip-materials" class="nav-item">吃瓜素材</a>
      <a href="/roster" class="nav-item">站點名冊</a>
      <a href="/settings" class="nav-item">設定</a>
      <a href="/history" class="nav-item">運行歷史</a>
      <a href="/audit" class="nav-item">Audit</a>
      <a href="/trash" class="nav-item">垃圾桶</a>
    </nav>
    <div class="sidebar-footer">v{{ app_version }}</div>
  </aside>
  <div class="main">
    <div class="page-header">
      <h1>{% block heading %}{% endblock %}</h1>
    </div>
    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
    <footer>local-crawl-post-factory v{{ app_version }}</footer>
  </div>
</div>
<script>
(function(){
  var sidebar=document.querySelector('.sidebar');
  var backdrop=document.getElementById('sidebar-backdrop');
  var toggle=document.getElementById('nav-toggle');
  function close(){if(sidebar)sidebar.classList.remove('open');if(backdrop)backdrop.classList.remove('open');document.body.style.overflow='';}
  if(toggle) toggle.addEventListener('click',function(){
    var open=sidebar.classList.toggle('open');
    backdrop.classList.toggle('open',open);
    document.body.style.overflow=open?'hidden':'';
  });
  if(backdrop) backdrop.addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  document.querySelectorAll('.nav-item').forEach(function(a){
    var href=a.getAttribute('href');
    var path=window.location.pathname;
    if(href===path||(href!=='/'&&path.startsWith(href))) a.classList.add('active');
  });
})();
</script>
</body>
</html>
